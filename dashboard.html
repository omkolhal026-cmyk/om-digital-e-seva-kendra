<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Claim Dashboard</title>

<link rel="stylesheet" href="dashboard.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

</head>

<body>

<div class="sidebar">

<div class="logo">
<h2>OM DIGITAL</h2>
<p>Claim Portal</p>
</div>

<ul>

<li class="active">
<a href="dashboard.html">
<i class="fa fa-home"></i>
Dashboard
</a>
</li>

<li>
<a href="claim-entry.html">
<i class="fa fa-file-circle-plus"></i>
New Claim
</a>
</li>

<li>
<a href="claim-list.html">
<i class="fa fa-list"></i>
My Claims
</a>
</li>

<li>
<a href="profile.html">
<i class="fa fa-user"></i>
Profile
</a>
</li>

<li>
<a href="index.html">
<i class="fa fa-right-from-bracket"></i>
Logout
</a>
</li>

</ul>

</div>

<div class="main">

<div class="topbar">

<h2>Dashboard</h2>

<div class="admin">

<i class="fa fa-user-circle"></i>

<span>Sub Agent</span>

</div>

</div>

<div class="cards">

<div class="card" onclick="location.href='claim-entry.html'">

<i class="fa fa-file-circle-plus"></i>

<h3>New Claim Entry</h3>

<p>Create New Claim</p>

</div>

<div class="card" onclick="location.href='claim-list.html'">

<i class="fa fa-list"></i>

<h3>My Claim List</h3>

<p>View Claims</p>

</div>

<div class="card">

<i class="fa fa-calendar-days"></i>

<h3>Today's Entry</h3>

<h1 id="today">0</h1>

</div>

<div class="card">

<i class="fa fa-indian-rupee-sign"></i>

<h3>Total Amount</h3>

<h1 id="amount">₹0</h1>

</div>

</div>

<div class="table-box">

<h3>Recent Claims</h3>

<table>

<thead>

<tr>

<th>Name</th>

<th>MH No.</th>

<th>Taluka</th>

<th>Amount</th>

<th>Date</th>

</tr>

</thead>

<tbody id="claimTable">

<tr>

<td colspan="5" align="center">

No Claim Found

</td>

</tr>

</tbody>

</table>

</div>

</div>

<script src="dashboard.js"></script>

</body>

</html>
