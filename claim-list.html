<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Claim List</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f4f7fb;
}

.container{
max-width:1200px;
margin:30px auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header h2{
color:#0B5ED7;
}

.search-box{
display:flex;
gap:10px;
}

.search-box input{
width:300px;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
outline:none;
}

.btn{
background:#0B5ED7;
color:#fff;
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.btn:hover{
background:#084298;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#0B5ED7;
color:#fff;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #eee;
text-align:center;
}

tr:hover{
background:#f9f9f9;
}

.action-btn{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin:2px;
}

.view{
background:#198754;
color:#fff;
}

.delete{
background:#dc3545;
color:#fff;
}

@media(max-width:768px){

.header{
flex-direction:column;
gap:15px;
}

.search-box{
width:100%;
}

.search-box input{
width:100%;
}

.container{
margin:10px;
padding:15px;
}

table{
font-size:13px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>Claim List</h2>

<div class="search-box">

<input type="text" id="search" placeholder="Search Name / MH Number">

<button class="btn" onclick="window.location='claim-entry.html'">

<i class="fa fa-plus"></i>

New Claim

</button>

</div>

</div>

<table>

<thead>

<tr>

<th>Sr</th>
<th>Name</th>
<th>MH No.</th>
<th>Taluka</th>
<th>Total</th>
<th>Date</th>
<th>Action</th>

</tr>

</thead>

<tbody id="claimBody">

</tbody>

</table>
