<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Claim List</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f4f7fb;
padding:25px;
}

.container{
max-width:1300px;
margin:auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;
}

.header h2{
color:#0B5ED7;
}

.search-box{
display:flex;
gap:10px;
}

.search-box input{
width:300px;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
}

.btn{
background:#0B5ED7;
color:#fff;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

.btn:hover{
background:#084298;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#0B5ED7;
color:#fff;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

.action{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin:2px;
}

.view{
background:#198754;
color:white;
}

.delete{
background:#dc3545;
color:white;
}

@media(max-width:768px){

.search-box{
width:100%;
flex-direction:column;
}

.search-box input{
width:100%;
}

table{
font-size:12px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>Claim List</h2>

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search Name / MH Number">

<button
class="btn"
onclick="window.location='claim-entry.html'">

+ New Claim

</button>

</div>

</div>

<table>

<thead>

<tr>

<th>Sr</th>
<th>Name</th>
<th>MH No.</th>
<th>Taluka</th>
<th>Total</th>
<th>Date</th>
<th>Action</th>

</tr>

</thead>

<tbody id="claimBody">

</tbody>

</table>

<br>

<button
class="btn"
onclick="window.location='dashboard.html'">

← Back Dashboard

</button>

</div>
<script>

let claims = JSON.parse(localStorage.getItem("claims")) || [];

const tbody = document.getElementById("claimBody");

function loadClaims(data){

    tbody.innerHTML="";

    if(data.length===0){

        tbody.innerHTML=`
        <tr>
            <td colspan="7">No Claim Found</td>
        </tr>`;
        return;
    }

    data.forEach((claim,index)=>{

        tbody.innerHTML += `
        <tr>
            <td>${index+1}</td>
            <td>${claim.name}</td>
            <td>${claim.mh}</td>
            <td>${claim.taluka}</td>
            <td>₹${claim.total}</td>
            <td>${claim.date}</td>
            <td>
                <button class="action view" onclick="viewClaim(${index})">
                    View
                </button>

                <button class="action delete" onclick="deleteClaim(${index})">
                    Delete
                </button>
            </td>
        </tr>`;
    });

}

loadClaims(claims);

// Search

document.getElementById("search").addEventListener("keyup",function(){

    let value=this.value.toLowerCase();

    let result=claims.filter(c=>

        c.name.toLowerCase().includes(value) ||

        c.mh.toLowerCase().includes(value)

    );

    loadClaims(result);

});

// View

function viewClaim(index){

    let c=claims[index];

    alert(

`Full Name : ${c.name}

MH Number : ${c.mh}

Verification Date : ${c.date}

Taluka : ${c.taluka}

Scheme 1 : ${c.scheme1}
Amount 1 : ₹${c.amount1}

Scheme 2 : ${c.scheme2}
Amount 2 : ₹${c.amount2}

Total Amount : ₹${c.total}`

    );

}

// Delete

function deleteClaim(index){

    if(confirm("Delete this Claim?")){

        claims.splice(index,1);

        localStorage.setItem("claims",JSON.stringify(claims));

        loadClaims(claims);

    }

}

</script>

</body>
</html>
