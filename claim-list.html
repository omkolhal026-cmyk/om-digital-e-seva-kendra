<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Claim List</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f4f7fb;
}

.container{
max-width:1300px;
margin:30px auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:15px;
}

.header h2{
color:#0B5ED7;
}

.search-box{
display:flex;
gap:10px;
}

.search-box input{
width:300px;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
outline:none;
}

.btn{
background:#0B5ED7;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.btn:hover{
background:#084298;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#0B5ED7;
color:white;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

.action{
padding:7px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin:2px;
font-size:13px;
}

.view{
background:#198754;
color:white;
}

.delete{
background:#dc3545;
color:white;
}

@media(max-width:768px){

.header{
flex-direction:column;
align-items:flex-start;
}

.search-box{
width:100%;
flex-direction:column;
}

.search-box input{
width:100%;
}

table{
font-size:12px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>Claim List</h2>

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search Name / MH Number">

<button
class="btn"
onclick="window.location='claim-entry.html'">

+ New Claim

</button>

<button
class="btn"
onclick="window.location='dashboard.html'">

Dashboard

</button>

</div>

</div>

<table>

<thead>

<tr>

<th>Sr</th>
<th>Full Name</th>
<th>MH Number</th>
<th>Taluka</th>
<th>Total Amount</th>
<th>Date</th>
<th>Action</th>

</tr>

</thead>

<tbody id="claimBody">

</tbody>

</table>
<script>

// ===== Login User =====

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
    window.location.href="login.html";
}

// ===== Load Claims =====

let claims = JSON.parse(localStorage.getItem("claims")) || [];

const tbody = document.getElementById("claimBody");

function loadClaims(data){

    tbody.innerHTML="";

    if(data.length===0){

        tbody.innerHTML=`
        <tr>
            <td colspan="7">No Claim Found</td>
        </tr>`;

        return;
    }

    data.forEach((claim,index)=>{

        let deleteBtn="";

        // Only Admin can Delete
        if(user.role==="Admin"){

            deleteBtn=`
            <button class="action delete"
            onclick="deleteClaim(${index})">
            Delete
            </button>`;

        }

        tbody.innerHTML +=`

        <tr>

            <td>${index+1}</td>

            <td>${claim.name}</td>

            <td>${claim.mh}</td>

            <td>${claim.taluka}</td>

            <td>₹${claim.total}</td>

            <td>${claim.date}</td>

            <td>

            <button class="action view"
            onclick="viewClaim(${index})">

            View

            </button>

            ${deleteBtn}

            </td>

        </tr>

        `;

    });

}

loadClaims(claims);

// ===== Search =====

document.getElementById("search").addEventListener("keyup",function(){

    let value=this.value.toLowerCase();

    let result=claims.filter(c=>

        c.name.toLowerCase().includes(value) ||

        c.mh.toLowerCase().includes(value)

    );

    loadClaims(result);

});

// ===== View =====

function viewClaim(index){

    let c=claims[index];

    alert(

`Full Name : ${c.name}

MH Number : ${c.mh}

Verification Date : ${c.date}

Taluka : ${c.taluka}

Scheme 1 : ${c.scheme1}

Amount 1 : ₹${c.amount1}

Scheme 2 : ${c.scheme2}

Amount 2 : ₹${c.amount2}

Total Amount : ₹${c.total}`

    );

}

// ===== Delete =====

function deleteClaim(index){

    if(user.role!=="Admin"){

        alert("Only Admin can delete claims.");

        return;

    }

    if(confirm("Delete this claim?")){

        claims.splice(index,1);

        localStorage.setItem("claims",JSON.stringify(claims));

        loadClaims(claims);

    }

}

</script>

</body>
</html>
