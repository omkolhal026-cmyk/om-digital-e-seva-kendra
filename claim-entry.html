<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>New Claim Entry</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f4f7fb;
}

.container{
max-width:900px;
margin:30px auto;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h2{
text-align:center;
color:#0B5ED7;
margin-bottom:25px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.form-group{
display:flex;
flex-direction:column;
}

label{
font-weight:600;
margin-bottom:8px;
}

input,select{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
outline:none;
}

input:focus,
select:focus{
border-color:#0B5ED7;
}

.total-box{
background:#0B5ED7;
color:white;
padding:15px;
border-radius:10px;
text-align:center;
font-size:22px;
font-weight:bold;
margin-top:20px;
}

.btn{
margin-top:25px;
width:100%;
padding:14px;
background:#0B5ED7;
color:white;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
}

.btn:hover{
background:#084298;
}

@media(max-width:768px){

.row{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<h2>New Claim Entry</h2>

<form id="claimForm">

<div class="row">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>MH Number</label>
<input type="text" id="mh" required>
</div>

</div>

<div class="row">

<div class="form-group">
<label>Verification Date</label>
<input type="date" id="date" required>
</div>

<div class="form-group">
<label>Taluka</label>

<select id="taluka">

<option value="">Select Taluka</option>

<option>Junnar</option>
<option>Ambegaon</option>
<option>Shirur</option>
<option>Khed</option>

</select>

</div>

</div>
<div class="row">

<div class="form-group">
<label>Scheme 1</label>

<select id="scheme1">

<option value="">Select Scheme</option>

<option>E01</option>
<option>E02</option>
<option>E03</option>
<option>E04</option>
<option>E05</option>
<option>E06</option>
<option>E07</option>
<option>S07</option>
<option>S13</option>

</select>

</div>

<div class="form-group">

<label>Amount 1</label>

<input type="number" id="amount1" value=none>

</div>

</div>

<div class="row">

<div class="form-group">

<label>Scheme 2</label>

<select id="scheme2">

<option value="">Select Scheme</option>

<option>E01</option>
<option>E02</option>
<option>E03</option>
<option>E04</option>
<option>E05</option>
<option>E06</option>
<option>E07</option>
<option>S07</option>
<option>S13</option>

</select>

</div>

<div class="form-group">

<label>Amount 2</label>

<input type="number" id="amount2" value="0">

</div>

</div>

<div class="total-box">

Total Amount :
₹ <span id="total">0</span>

</div>

<button class="btn" type="submit">

<i class="fa-solid fa-floppy-disk"></i>

Save Claim

</button>

</form>

</div>

<script>

const amount1=document.getElementById("amount1");

const amount2=document.getElementById("amount2");

const total=document.getElementById("total");

function calculate(){

let a1=Number(amount1.value)||0;

let a2=Number(amount2.value)||0;

total.innerHTML=a1+a2;

}

amount1.onkeyup=calculate;
amount2.onkeyup=calculate;
amount1.onchange=calculate;
amount2.onchange=calculate;

document.getElementById("claimForm").onsubmit=function(e){

e.preventDefault();

let claims=JSON.parse(localStorage.getItem("claims")) || [];

claims.push({

name:document.getElementById("name").value,

mh:document.getElementById("mh").value,

date:document.getElementById("date").value,

taluka:document.getElementById("taluka").value,

scheme1:document.getElementById("scheme1").value,

amount1:amount1.value,

scheme2:document.getElementById("scheme2").value,

amount2:amount2.value,

total:total.innerHTML

});

localStorage.setItem("claims",JSON.stringify(claims));
console.log("Saved Claims:", claims);

alert("Claim Saved Successfully");

window.location.href="dashboard.html";

}

</script>

</body>

</html>
